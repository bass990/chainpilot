name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# CI runs lint + smoke tests on every push/PR.
# CI does NOT make Claude API calls — those happen only via the manual-trigger
# eval.yml workflow when explicitly invoked. This keeps push/PR feedback free
# and prevents accidental billing on every commit.

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check chainpilot eval tests

      - name: Smoke tests
        env:
          # The eval-harness tests are designed to run without an Anthropic key —
          # they verify scaffold + scoring logic, not LLM behavior.
          # Pipeline tests use mocked Claude clients.
          ANTHROPIC_API_KEY: "test-key-only-used-for-import"
          PYTHONPATH: ${{ github.workspace }}
        run: pytest tests/ -v --tb=short
